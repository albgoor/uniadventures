<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Trip</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav class="navbar navbar-dark bg-success px-5">
    <a class="navbar-brand fw-bold" href="/">UniAdventures</a>
</nav>

<div class="container my-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 600px;">
        <h2 class="text-success mb-3">Book Your Trip</h2>

        <h4>{{ trip.trip_name }}</h4>
        <p>{{ trip.destination }}</p>
        <p><strong>Date:</strong> {{ trip.trip_date }}</p>
        <p><strong>Price:</strong> {{ trip.price }} JD</p>

        <hr>

        <form method="POST" action="/confirm_booking/{{ trip.id }}">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="full_name" class="form-control" placeholder="Enter your full name" required>
               
            </div>

            <div class="mb-3">
                <label class="form-label">Student ID</label>
                <input type="text" name="student_id" class="form-control" placeholder="Enter your university ID" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text" name="phone" class="form-control" placeholder="Enter your phone number" required>
            </div>

            <button type="submit" class="btn btn-success w-100">
                Confirm Booking
            </button>
        </form>
    </div>
</div>

</body>
</html>
